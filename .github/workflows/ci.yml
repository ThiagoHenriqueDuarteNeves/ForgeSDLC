name: CI

on:
  push:
  pull_request:

jobs:
  api:
    name: API (ruff + pytest)
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forge -d forge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://forge:forge@localhost:5432/forge
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Sync deps (Python 3.11 fixado)
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Migrations
        run: uv run alembic upgrade head
      - name: Testes (pytest)
        run: uv run pytest

  web:
    name: Web (eslint + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Testes (vitest)
        run: npm test
      - name: Build (next)
        run: npm run build

  docker:
    name: Build das imagens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose build
        run: docker compose build
