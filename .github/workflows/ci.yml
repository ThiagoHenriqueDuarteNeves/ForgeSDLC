name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL da API de staging para o red team (garak). Vazio = só lista probes."
        required: false
        default: ""
  schedule:
    # Avaliação noturna (03:00 UTC). Só o job `eval` roda neste gatilho.
    - cron: "0 3 * * *"

jobs:
  api:
    name: API (ruff + pytest)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forge -d forge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://forge:forge@localhost:5432/forge
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Sync deps (Python 3.11 fixado)
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Migrations
        run: uv run alembic upgrade head
      - name: Testes (pytest)
        run: uv run pytest

  web:
    name: Web (eslint + vitest + build)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Testes (vitest)
        run: npm test
      - name: Build (next)
        run: npm run build

  docker:
    name: Build das imagens
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose build
        run: docker compose build

  eval:
    name: Avaliação offline (noturno)
    # Só no cron noturno e no disparo manual — não em cada push.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      # Preenchidos por secrets quando disponíveis; sem eles, a avaliação
      # (--full) se auto-pula e o job segue verde (dry-run informativo).
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Sync deps (com grupo eval)
        run: uv sync --group eval
      - name: Rodar avaliação (dataset + DeepEval quando há segredos)
        run: uv run python ../../scripts/eval.py --full --push --out eval-report.json
      - name: Publicar relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: apps/api/eval-report.json
          if-no-files-found: ignore

  redteam:
    name: Red team (garak)
    # Executável sob demanda. Com `api_url`, ataca a API de staging; sem ela,
    # comprova que o garak roda (lista probes). Relatório sempre como artifact.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar garak
        run: pip install garak
      - name: Rodar garak (REST) ou listar probes
        env:
          API_URL: ${{ github.event.inputs.api_url }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          mkdir -p redteam
          if [ -n "$API_URL" ]; then
            cat > redteam/rest.json <<JSON
          {
            "rest": {
              "RestGenerator": {
                "uri": "${API_URL}",
                "method": "post",
                "headers": {"Content-Type": "application/json", "X-API-Token": "${API_TOKEN}"},
                "req_template_json_object": {"text": "\$INPUT"},
                "response_json": true,
                "response_json_field": "detail"
              }
            }
          }
          JSON
            garak --model_type rest -G redteam/rest.json --probes promptinject \
              --report_prefix redteam/forge || true
          else
            echo "sem api_url: comprova que o garak é executável (lista probes)"
            garak --list_probes > redteam/probes.txt || true
          fi
      - name: Publicar relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garak-report
          path: redteam/
          if-no-files-found: ignore
